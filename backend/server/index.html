<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>WindowPilot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F8F9FA;
            --card: #FFF;
            --border: #F0F0F0;
            --text: #111;
            --sub: #555;
            --muted: #999;
            --accent: #2563EB;
            --green: #10B981;
            --orange: #F59E0B;
            --red: #EF4444;
            --r: 16px;
            --sh: 0 1px 3px rgba(0, 0, 0, 0.04), 0 4px 16px rgba(0, 0, 0, 0.04)
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden
        }

        .layout {
            display: grid;
            grid-template-columns: 58% 42%;
            height: 100vh
        }

        .left-col {
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        .window-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--card);
            gap: 12px
        }

        .controls-area {
            height: 42%;
            background: var(--bg);
            padding: 20px 24px;
            overflow-y: auto;
            border-top: 1px solid var(--border)
        }

        .right-col {
            background: var(--card);
            border-left: 1px solid var(--border);
            padding: 24px;
            overflow-y: auto
        }

        .window {
            position: relative;
            width: 260px;
            height: 360px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.06)
        }

        .w-sky {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, #3B82F6 0%, #60A5FA 30%, #93C5FD 60%, #DBEAFE 100%)
        }

        .w-glass {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            transition: opacity 0.8s
        }

        .w-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.06) 0px, rgba(0, 0, 0, 0.06) 1px, transparent 1px, transparent 5px), repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.04) 0px, rgba(0, 0, 0, 0.04) 1px, transparent 1px, transparent 5px);
            transition: height 0.6s;
            border-bottom: 3px solid rgba(0, 0, 0, 0.12)
        }

        .w-frame {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 3px;
            margin-left: -1.5px;
            background: rgba(0, 0, 0, 0.06)
        }

        .w-glow {
            position: absolute;
            bottom: 0;
            left: 8%;
            right: 8%;
            border-radius: 8px 8px 0 0;
            background: linear-gradient(180deg, transparent, rgba(251, 191, 36, 0.6));
            transition: height 0.6s;
            box-shadow: 0 -8px 24px rgba(251, 191, 36, 0.3)
        }

        .w-pct {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 56px;
            font-weight: 800;
            color: rgba(0, 0, 0, 0.7);
            letter-spacing: -3px
        }

        .w-badge {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06)
        }

        .w-btns {
            display: flex;
            gap: 8px
        }

        .w-btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--sub)
        }

        .w-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: var(--sh)
        }

        .ctrl-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px
        }

        .ctrl-card {
            background: var(--card);
            border-radius: var(--r);
            padding: 16px;
            box-shadow: var(--sh)
        }

        .ctrl-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 12px
        }

        .sl-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px
        }

        .sl-label {
            font-size: 13px;
            color: var(--sub)
        }

        .sl-val {
            font-size: 13px;
            font-weight: 600;
            font-family: monospace
        }

        input[type=range] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            accent-color: var(--accent);
            cursor: pointer;
            margin-bottom: 10px;
            -webkit-appearance: none;
            background: #E5E7EB
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(37, 99, 235, 0.3)
        }

        .tog-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0
        }

        .tog-label {
            font-size: 13px;
            color: var(--sub)
        }

        .tog-sw {
            width: 44px;
            height: 26px;
            border-radius: 13px;
            cursor: pointer;
            position: relative;
            transition: background 0.2s
        }

        .tog-sw .k {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            position: absolute;
            top: 3px;
            transition: left 0.2s;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2)
        }

        .scene-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px
        }

        .scene-btn {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s
        }

        .scene-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: var(--sh)
        }

        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            margin: 2px
        }

        .tag-r {
            background: #FEF2F2;
            color: #DC2626
        }

        .tag-n {
            background: #F3F4F6;
            color: #6B7280
        }

        .bt-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px
        }

        .bt-legend {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 16px
        }

        .bt-wrap {
            border-radius: var(--r);
            border: 1px solid var(--border);
            padding: 12px;
            background: var(--bg)
        }

        .bt-n {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 8px;
            border-radius: 8px;
            margin: 2px 0;
            border-left: 3px solid transparent;
            transition: all 0.2s
        }

        .bt-n-s {
            border-left-color: var(--green);
            background: #F0FDF4
        }

        .bt-n-r {
            border-left-color: var(--orange);
            background: #FFFBEB
        }

        .bt-n-f {
            opacity: 0.5
        }

        .bt-n-i {
            opacity: 0.2
        }

        .bt-d {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            flex-shrink: 0
        }

        .bt-d-s {
            background: var(--green);
            box-shadow: 0 0 6px rgba(16, 185, 129, 0.5)
        }

        .bt-d-r {
            background: var(--orange);
            box-shadow: 0 0 6px rgba(245, 158, 11, 0.5);
            animation: blink 1s ease-in-out infinite
        }

        .bt-d-f {
            background: #D1D5DB
        }

        .bt-d-i {
            background: #E5E7EB
        }

        .bt-nm {
            font-size: 13px;
            font-weight: 500;
            color: var(--text)
        }

        .bt-n-s .bt-nm {
            color: #065F46;
            font-weight: 600
        }

        .bt-n-r .bt-nm {
            color: #92400E;
            font-weight: 600
        }

        .bt-n-f .bt-nm {
            color: var(--muted)
        }

        .bt-n-i .bt-nm {
            color: #D1D5DB
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
                transform: scale(1)
            }

            50% {
                opacity: 0.5;
                transform: scale(0.8)
            }
        }

        .rec-card {
            margin-top: 16px;
            padding: 20px;
            border-radius: var(--r);
            background: var(--card);
            box-shadow: var(--sh);
            border: 1px solid var(--border);
            animation: fadeUp 0.3s ease
        }

        .rec-card h3 {
            font-size: 15px;
            margin-bottom: 6px
        }

        .rec-card p {
            font-size: 13px;
            color: var(--sub);
            line-height: 1.5;
            margin-bottom: 14px
        }

        .rec-btns {
            display: flex;
            gap: 10px
        }

        .rec-ok {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            background: var(--green);
            color: #fff;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer
        }

        .rec-no {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            background: #fff;
            color: var(--red);
            border: 1px solid #FECACA;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .log-item {
            font-size: 11px;
            font-family: monospace;
            padding: 4px 0;
            border-bottom: 1px solid var(--border);
            color: var(--sub)
        }

        .log-b {
            color: var(--accent);
            font-weight: 600
        }
    </style>
</head>

<body>
    <div style="display:flex;flex-direction:column;height:100vh">
        <div class="layout" style="flex:1;min-height:0">
            <div class="left-col">
                <div class="window-area" id="wa"></div>
                <div class="controls-area" id="ca"></div>
            </div>
            <div class="right-col" id="rc"></div>
        </div>
        <!-- 语音输入栏（固定，不被render覆盖） -->
        <div
            style="padding:8px 24px;background:var(--card);border-top:1px solid var(--border);display:flex;gap:8px;align-items:center">
            <span style="font-size:12px;color:var(--muted);white-space:nowrap">🗣️ AI 语音指令</span>
            <input id="voice-input" type="text" placeholder="说一句话，比如：卧室太闷了，帮我通通风，别开太大"
                style="flex:1;padding:10px 14px;border-radius:10px;border:1px solid var(--border);font-size:14px;outline:none"
                onkeydown="if(event.key==='Enter')sendVoice()">
            <button class="w-btn"
                style="background:var(--accent);color:#fff;border-color:var(--accent);padding:10px 20px;font-size:13px"
                onclick="sendVoice()">AI 解析执行</button>
        </div>
        <!-- 底部日志面板 -->
        <div id="logbar"
            style="height:200px;background:#1A1A2E;color:#D4D4D4;font-family:'SF Mono','Fira Code',monospace;font-size:12px;padding:10px 20px;overflow-y:auto;border-top:3px solid #2D2D44;flex-shrink:0">
            <div style="color:#7B7B9B;margin-bottom:6px;font-size:11px;font-weight:700;letter-spacing:1px">SYSTEM LOG ·
                DECISION TRACE · EXECUTION PATH</div>
            <div id="loglines"></div>
        </div>
    </div>
    </div>
    <script>
        var ws, D; function connect() { ws = new WebSocket((location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws'); ws.onclose = function () { setTimeout(connect, 2000) }; ws.onmessage = function (e) { D = JSON.parse(e.data); if (D.type === 'tick') render() } }
        function send(m) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(m)) } function sensor(k, v) { send({ cmd: 'set_sensor', key: k, value: v }) } connect();
        function render() {
            if (!D || !D.thing_model) return; var tm = D.thing_model, w = tm.window, a = tm.actuator, s = tm.screen, se = tm.sensors, cfg = tm.config, tags = D.semantic ? D.semantic.tags : [], branch = D.bt_branch || 'Idle', log = D.decision_log || [], card = tm.ai ? tm.ai.card : null, wp = Math.round(w.open_pct || 0), sp = Math.round(s.position_pct || 0);
            var sc = w.state === 'opening' ? 'var(--green)' : w.state === 'closing' ? 'var(--orange)' : 'var(--sub)', st = w.state === 'closed' ? '已关闭' : w.state === 'opening' ? '正在打开' : w.state === 'closing' ? '正在关闭' : w.state === 'open_partial' ? '已打开' : '—';
            document.getElementById('wa').innerHTML = '<div class="window"><div class="w-sky"></div><div class="w-glass" style="opacity:' + (1 - wp / 100 * 0.95) + '"></div><div class="w-screen" style="height:' + sp + '%"></div><div class="w-frame"></div>' + (wp > 2 ? '<div class="w-glow" style="height:' + Math.min(wp, 80) + 'px"></div>' : '') + '<div class="w-pct">' + wp + '%</div><div class="w-badge" style="color:' + sc + '">' + st + '</div></div><div style="font-size:14px;color:var(--sub)">纱窗 ' + sp + '% · ' + (a.state || 'idle') + ' · ' + Math.round(a.stroke_mm || 0) + 'mm · ' + Math.round(a.current_ma || 120) + 'mA</div>' +
                '<div class="w-btns" style="margin-top:12px"><button class="w-btn" onclick="send({cmd:\'user_open_to\',value:30})">30%</button><button class="w-btn" onclick="send({cmd:\'user_open_to\',value:60})">60%</button><button class="w-btn" onclick="send({cmd:\'user_open_to\',value:100})">全开</button><button class="w-btn" onclick="send({cmd:\'user_stop\'})">停止</button><button class="w-btn" onclick="send({cmd:\'user_open_to\',value:0})">关窗</button></div>' + (card ? '<div class="rec-card"><h3>' + card.title + '</h3><p>' + card.reason + '</p><div class="rec-btns"><button class="rec-ok" onclick="send({cmd:\'accept_recommendation\'})">✓ 确认执行</button><button class="rec-no" onclick="send({cmd:\'reject_recommendation\'})">✕ 拒绝</button></div></div>' : '');
            document.getElementById('ca').innerHTML = '<div class="ctrl-grid"><div class="ctrl-card"><div class="ctrl-title">环境传感器</div>' + SL('CO₂', se.co2_ppm || 400, 300, 2500, 10, 'ppm', 'co2_ppm') + SL('室温', se.temp_indoor || 26, 10, 42, 0.5, '°C', 'temp_indoor_c') + SL('湿度', se.humidity || 50, 10, 100, 1, '%', 'humidity_pct') + SL('风速', se.wind_speed || 0, 0, 20, 0.5, 'm/s', 'wind_speed_ms') + SL('VOC', se.voc_mg || 0, 0, 2, 0.05, 'mg', 'voc_mg') + '</div><div class="ctrl-card"><div class="ctrl-title">安全状态</div>' + TG('🌧️ 降雨', se.rain, "sensor('rain_detected'," + (!se.rain) + ")") + TG('👤 人体', se.human, "sensor('human_detected'," + (!se.human) + ")") + '<div class="ctrl-title" style="margin-top:12px">语义标签</div>' + tags.map(function (t) { return '<span class="tag ' + (t.includes('HIGH') || t.includes('STORM') ? 'tag-r' : 'tag-n') + '">' + t + '</span>' }).join('') + '</div><div class="ctrl-card"><div class="ctrl-title">场景预设</div><div class="scene-grid">' + SC('🌙 睡前通风', 'bedroom_ventilation') + SC('👶 儿童房', 'child_room') + SC('⛈️ 暴雨', 'storm_emergency') + SC('🧣 老人防寒', 'elderly_cold') + SC('💻 会议', 'study_meeting') + SC('↺ 重置', '__reset') + '</div>' + (log.length ? '<div class="ctrl-title" style="margin-top:12px">日志</div>' + log.slice(0, 3).map(function (e) { return '<div class="log-item">#' + e.tick + ' <span class="log-b">' + e.branch + '</span> ' + e.action + '</div>' }).join('') : '') + '</div></div>';
            document.getElementById('rc').innerHTML = '<div class="bt-title">行为树</div><div class="bt-legend"><span style="color:var(--green)">● 成功</span> · <span style="color:var(--orange)">◉ 运行中</span> · ○ 失败 · · 未评估</div><div class="bt-wrap">' + BT(D.tree, 0) + '</div>';
            // 底部日志面板 — 展示完整执行逻辑
            var logEl = document.getElementById('loglines');
            var ts = new Date().toLocaleTimeString('zh-CN', { hour12: false });

            // 从行为树中提取执行路径
            var path = [];
            function tracePath(node) {
                var s = (node.status || '').toLowerCase();
                if (s === 'success' || s === 'running') {
                    path.push({ name: node.name, status: s });
                    if (node.children) node.children.forEach(tracePath);
                }
            }
            if (D.tree) tracePath(D.tree);

            // 构建路径字符串
            var pathStr = path.map(function (p) {
                var color = p.status === 'success' ? '#4EC9B0' : '#DCDCAA';
                var icon = p.status === 'success' ? '✓' : '◉';
                return '<span style="color:' + color + '">' + icon + p.name + '</span>';
            }).join(' → ');

            // 主状态行
            var line1 = '<span style="color:#666">' + ts + '</span> <span style="color:#569CD6">Tick#' + D.tick + '</span> ';
            line1 += '<span style="color:#C586C0">分支=' + branch + '</span> ';
            line1 += 'win=<span style="color:#B5CEA8">' + wp + '%</span> scr=<span style="color:#B5CEA8">' + sp + '%</span> ';
            line1 += 'act=<span style="color:' + (a.state === 'extending' || a.state === 'retracting' ? '#DCDCAA' : '#666') + '">' + (a.state || 'idle') + '</span> ';
            line1 += Math.round(a.stroke_mm || 0) + 'mm ' + Math.round(a.current_ma || 120) + 'mA';

            // 决策路径行
            var line2 = '<span style="color:#555;margin-left:60px">路径: </span>' + (pathStr || '<span style="color:#555">无活跃路径</span>');

            // 语义+推荐行（只在有变化时显示）
            var line3 = '';
            if (tags.length) line3 += '<span style="color:#555;margin-left:60px">语义: </span><span style="color:#CE9178">[' + tags.join(', ') + ']</span> ';
            if (card) line3 += '<span style="color:#DCDCAA">→ 推荐: ' + card.title + ' (' + card.reason + ')</span>';
            if (log.length) line3 += ' <span style="color:#B5CEA8">trace: ' + log[0].branch + ' → ' + log[0].action + ' = ' + (log[0].result || '') + '</span>';

            var div = document.createElement('div');
            div.style.cssText = 'padding:2px 0;border-bottom:1px solid #2a2a2a;line-height:1.4';
            div.innerHTML = line1 + '<br>' + line2 + (line3 ? '<br>' + line3 : '');
            logEl.insertBefore(div, logEl.firstChild);
            while (logEl.children.length > 60) logEl.removeChild(logEl.lastChild);
        }
        function BT(n, d) { var s = (n.status || 'i').toLowerCase(); if (s === 'invalid' && d > 2) return ''; var nc = s === 'success' ? 'bt-n-s' : s === 'running' ? 'bt-n-r' : s === 'failure' ? 'bt-n-f' : 'bt-n-i', dc = s === 'success' ? 'bt-d-s' : s === 'running' ? 'bt-d-r' : s === 'failure' ? 'bt-d-f' : 'bt-d-i'; var h = '<div class="bt-n ' + nc + '" style="padding-left:' + d * 16 + 'px"><div class="bt-d ' + dc + '"></div><span class="bt-nm">' + n.name + '</span></div>'; if (n.children) n.children.forEach(function (c) { h += BT(c, d + 1) }); return h }
        function SL(l, v, mn, mx, st, u, k) { return '<div class="sl-row"><span class="sl-label">' + l + '</span><span class="sl-val">' + v + u + '</span></div><input type=range min=' + mn + ' max=' + mx + ' step=' + st + ' value=' + v + ' oninput="sensor(\'' + k + '\',+this.value)">' }
        function TG(l, on, oc) { return '<div class="tog-row"><span class="tog-label">' + l + '</span><div class="tog-sw" style="background:' + (on ? 'var(--red)' : '#E5E7EB') + '" onclick="' + oc + '"><div class="k" style="left:' + (on ? '21px' : '3px') + '"></div></div></div>' }
        function SC(l, id) { var oc = id === '__reset' ? "send({cmd:'reset'})" : "send({cmd:'load_scenario',value:'" + id + "'})"; return '<button class="scene-btn" onclick="' + oc + '">' + l + '</button>' }
        function sendVoice() {
            var input = document.getElementById('voice-input');
            if (!input || !input.value.trim()) return;
            var text = input.value.trim();
            send({ cmd: 'user_intent', value: text });
            input.value = '';
            // 在日志中显示用户输入
            var logEl = document.getElementById('loglines');
            var div = document.createElement('div');
            div.style.cssText = 'padding:4px 0;border-bottom:1px solid #2a2a2a;line-height:1.5;font-size:13px';
            div.innerHTML = '🗣️ <span style="color:#DCDCAA;font-weight:600">用户输入:</span> <span style="color:#CE9178;font-style:italic">"' + text + '"</span> → <span style="color:#4EC9B0">AI-1 解析 → 行为树执行</span>';
            logEl.insertBefore(div, logEl.firstChild);
        }
    </script>
</body>

</html>
